<!-- ═══ FLOATING SPORTS ORBS (background) ═══ -->
<div class="orb orb-1">🏏</div>
<div class="orb orb-2">⚽</div>
<div class="orb orb-3">🏆</div>
<div class="orb orb-4">🎯</div>
<div class="orb orb-5">🏅</div>

<div class="login-page">

  <!-- Registration success toast -->
  <div class="reg-toast" *ngIf="registeredToast">
    ✅ Account registered! Please sign in.
  </div>
  <button class="back-btn" (click)="goHome()">
    <span class="back-arrow">←</span> Back to Home
  </button>

  <!-- Brand Header -->
  <div class="brand">
    <img src="assets/images/logo1.png" alt="AuctionDeck Logo" class="brand-logo" />
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="card-header">
      <div class="shield-icon">🛡️</div>
      <h2>Admin Login</h2>
      <p>Sign in to manage your auction events</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">

      <div class="field">
        <label for="username">Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input
            id="username"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
      </div>

      <button type="submit" class="btn-login" [class.loading]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="error-msg" *ngIf="errorMsg">
        ⚠️ {{ errorMsg }}
      </div>

    </form>

    <div class="card-footer">
      <p>New organiser? <a (click)="goToSignup()">Create a free account</a></p>
      <p class="footer-divider">Need help? <a href="mailto:support@auctiondeck.in">Contact Support</a></p>
    </div>
  </div>

  <p class="tagline">Trusted by 120+ auction organisers across the country</p>

</div>
