<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>
  
  <!-- Document -->
  <rect x="30" y="20" width="140" height="160" rx="5" fill="white" stroke="#999" stroke-width="2"/>
  
  <!-- Lines on document -->
  <line x1="40" y1="40" x2="160" y2="40" stroke="#ddd" stroke-width="2"/>
  <line x1="40" y1="55" x2="160" y2="55" stroke="#ddd" stroke-width="2"/>
  <line x1="40" y1="70" x2="160" y2="70" stroke="#ddd" stroke-width="2"/>
  
  <!-- Checkmark circle -->
  <circle cx="100" cy="120" r="25" fill="#4caf50"/>
  <path d="M 90 120 L 100 130 L 115 105" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Label -->
  <text x="100" y="190" font-size="12" text-anchor="middle" fill="#666">Payment Proof</text>
</svg>
